<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة رقمية</title>
    <style>
        body { background: #f4f7f9; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; border-top: 8px solid #2b5876; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .status { padding: 15px; border-radius: 8px; font-weight: bold; margin: 20px 0; }
        .s-active { background: #e3f2fd; color: #0d47a1; } .s-ready { background: #e8f5e9; color: #1b5e20; } .s-delivered { background: #f5f5f5; color: #616161; border: 1px dashed #999; }
        table { width: 100%; text-align: right; margin-bottom: 20px; } td, th { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<div class="card" id="card" style="display:none;">
    <h2 style="color:#2b5876;">مغسلتنا الرسمية</h2>
    <div id="status" class="status"></div>
    <table>
        <tr><th>رقم الفاتورة:</th><td id="code"></td></tr>
        <tr><th>الخدمة:</th><td id="services"></td></tr>
        <tr><th>الإجمالي:</th><td style="font-weight:bold; color:#e74c3c;"><span id="total"></span> ريال</td></tr>
    </table>
    <small style="color:#999;">شكراً لاختياركم خدماتنا</small>
</div>
<div id="err" style="display:none; text-align:center; color:#999; margin-top:50px;">الفاتورة غير موجودة أو تم أرشفة الرقم.</div>
<script>
    const code = new URLSearchParams(window.location.search).get('code');
    if(code) {
        fetch(`/api/customer-view/${code}`).then(r=>r.json()).then(data=>{
            if(data.success) {
                document.getElementById('card').style.display = 'block';
                document.getElementById('code').innerText = '#' + data.invoice.invoice_code;
                document.getElementById('services').innerText = data.invoice.services;
                document.getElementById('total').innerText = data.invoice.total_amount;
                
                const sb = document.getElementById('status');
                if(data.invoice.status === 'Active') { sb.innerText = '🔄 ملابسك: قيد الغسيل'; sb.className = 'status s-active'; }
                else if(data.invoice.status === 'Ready') { sb.innerText = '✨ ملابسك: جاهزة للاستلام'; sb.className = 'status s-ready'; }
                else { sb.innerText = '✅ تم استلام الملابس بنجاح'; sb.className = 'status s-delivered'; }
            } else document.getElementById('err').style.display = 'block';
        });
    }
</script>
</body>
</html>
