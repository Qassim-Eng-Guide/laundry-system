<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>لوحة الإدارة المالية</title>
    <style>
        body { background: #eef2f5; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; color: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { flex: 1; min-width: 200px; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-right: 5px solid #3498db; }
        .val { font-size: 26px; font-weight: bold; color: #2c3e50; margin: 10px 0; }
    </style>
</head>
<body>
<div class="header">
    <h2>الإدارة المالية للبراند 📊</h2>
    <div>
        <button onclick="window.location.href='/index.html';" style="padding:10px; cursor:pointer;">نظام الكاشير</button>
        <button onclick="localStorage.clear(); window.location.href='/login.html';" style="padding:10px; background:#e74c3c; color:white; border:none; cursor:pointer;">خروج</button>
    </div>
</div>
<div class="grid">
    <div class="card"><h3>اليوم</h3><div class="val" id="t-profit">0 ريال</div><small>فواتير: <span id="t-cust">0</span></small></div>
    <div class="card"><h3>هذا الأسبوع</h3><div class="val" id="w-profit">0 ريال</div><small>فواتير: <span id="w-cust">0</span></small></div>
    <div class="card"><h3>هذا الشهر</h3><div class="val" id="m-profit">0 ريال</div><small>فواتير: <span id="m-cust">0</span></small></div>
    <div class="card" style="border-right-color:#2ecc71;"><h3>السنة كاملة</h3><div class="val" id="y-profit">0 ريال</div><small>فواتير: <span id="y-cust">0</span></small></div>
</div>
<script>
    if(localStorage.getItem('user_role') !== 'admin') window.location.href='/login.html';
    fetch('/api/admin/stats').then(r=>r.json()).then(d=>{
        if(d.success){
            document.getElementById('t-profit').innerText = d.stats.today.profit + ' ريال'; document.getElementById('t-cust').innerText = d.stats.today.customers;
            document.getElementById('w-profit').innerText = d.stats.week.profit + ' ريال'; document.getElementById('w-cust').innerText = d.stats.week.customers;
            document.getElementById('m-profit').innerText = d.stats.month.profit + ' ريال'; document.getElementById('m-cust').innerText = d.stats.month.customers;
            document.getElementById('y-profit').innerText = d.stats.year.profit + ' ريال'; document.getElementById('y-cust').innerText = d.stats.year.customers;
        }
    });
</script>
</body>
</html>
