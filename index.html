<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>لوحة الموظف - المغسلة الذكية</title>
    <style>
        body { background: #eef2f5; font-family: 'Segoe UI', sans-serif; padding: 20px; color: #2c3e50; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #2b5876; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 300px; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 15px; border: 1px solid #bdc3c7; border-radius: 5px; }
        button { width: 100%; padding: 12px; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-green { background: #2ecc71; } .btn-blue { background: #3498db; } .btn-yellow { background: #f1c40f; color: black; } .btn-red { background: #e74c3c; }
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-box input { margin-bottom: 0; flex: 3; } .search-box button { margin-bottom: 0; flex: 1; }
        .result-card { display: none; background: #f8f9fa; padding: 15px; border-right: 4px solid #2b5876; border-radius: 5px; margin-top: 15px; line-height: 1.8; }
        @media print { body * { display: none; } #print-area, #print-area * { display: block; } #print-area { text-align: center; font-family: monospace; font-size: 12px; } }
    </style>
</head>
<body>
<div class="header">
    <h2>لوحة تحكم الكاشير 🧺</h2>
    <button onclick="localStorage.clear(); window.location.href='/login.html';" style="width:auto; background:#e74c3c; padding:8px 15px;">خروج</button>
</div>
<div class="grid">
    <div class="col">
        <h3 style="color:#2b5876;">استلام طلب جديد</h3><hr>
        <input type="text" id="phone" placeholder="رقم جوال العميل (مثال: 05...)" required>
        <textarea id="services" rows="3" placeholder="تفاصيل الخدمة..." required></textarea>
        <input type="number" id="total" placeholder="الإجمالي بالريال" required>
        <button class="btn-green" onclick="createInvoice()">حفظ وإرسال الفاتورة 📱</button>
    </div>
    <div class="col">
        <h3 style="color:#2b5876;">البحث والتسليم</h3><hr>
        <div class="search-box">
            <input type="text" id="search-code" placeholder="رقم الفاتورة أو الجوال...">
            <button class="btn-blue" onclick="searchInvoice()">بحث</button>
        </div>
        <div id="result-card" class="result-card">
            <strong>رقم الفاتورة:</strong> <span id="res-code"></span><br>
            <strong>الجوال:</strong> <span id="res-phone"></span><br>
            <strong>القطع:</strong> <span id="res-services"></span><br>
            <strong>الحساب:</strong> <span id="res-total"></span> ريال<br>
            <hr>
            <button id="btn-ready-wa" class="btn-yellow">إرسال إشعار جاهزية للواتساب 🔔</button>
            <button class="btn-blue" onclick="window.print()">طباعة تكت التثبيت 🖨️</button>
            <button class="btn-red" onclick="deliverInvoice()">تسليم للعميل (تحرير الرقم) ✅</button>
        </div>
    </div>
</div>
<div id="print-area" style="display:none;">
    <h3>المغسلة الذكية</h3>
    <p>فاتورة: <b id="p-code"></b></p>
    <p>جوال: <span id="p-phone"></span></p>
    <p>الخدمة: <span id="p-services"></span></p>
    <p>الحساب: <span id="p-total"></span> ريال</p>
    <p>---</p>
</div>
<script>
    if(!localStorage.getItem('user_role')) window.location.href='/login.html';
    
    async function createInvoice() {
        const p = document.getElementById('phone').value, s = document.getElementById('services').value, t = document.getElementById('total').value;
        if(!p || !s || !t) return alert('أكمل البيانات');
        const res = await fetch('/api/create-invoice', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({customer_phone: p, services: s, total_amount: t, created_by: localStorage.getItem('user_name')}) });
        const data = await res.json();
        if(data.success) { alert(`تم التسجيل. رقم الفاتورة #${data.invoice_code}`); window.open(data.whatsapp_url, '_blank'); window.location.reload(); }
    }
    
    async function searchInvoice() {
        const q = document.getElementById('search-code').value;
        if(!q) return;
        const res = await fetch(`/api/search-invoice/${q}`);
        const data = await res.json();
        if(data.success) {
            document.getElementById('result-card').style.display = 'block';
            document.getElementById('res-code').innerText = data.invoice.invoice_code; document.getElementById('p-code').innerText = data.invoice.invoice_code;
            document.getElementById('res-phone').innerText = data.invoice.customer_phone; document.getElementById('p-phone').innerText = data.invoice.customer_phone;
            document.getElementById('res-services').innerText = data.invoice.services; document.getElementById('p-services').innerText = data.invoice.services;
            document.getElementById('res-total').innerText = data.invoice.total_amount; document.getElementById('p-total').innerText = data.invoice.total_amount;
            document.getElementById('btn-ready-wa').onclick = () => window.open(data.whatsapp_ready_url, '_blank');
        } else { alert(data.message); }
    }
    
    async function deliverInvoice() {
        const code = document.getElementById('res-code').innerText;
        const res = await fetch('/api/deliver-invoice', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({invoice_code: code}) });
        const data = await res.json();
        if(data.success) { alert(data.message); window.location.reload(); }
    }
</script>
</body>
</html>
